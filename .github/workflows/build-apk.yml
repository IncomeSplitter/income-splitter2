name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create keystore
        run: |
          keytool -genkeypair -dname "CN=Income Splitter, O=IncomeSplitter, C=NZ" -alias incomesplitter -keypass android123 -keystore app.keystore -storepass android123 -validity 10000 -keyalg RSA -keysize 2048

      - name: Create Android project files
        run: python3 create_project.py

      - name: Build APK
        run: |
          cd twa
          gradle assembleRelease --no-daemon

      - name: Find APK
        run: find twa -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: income-splitter-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
