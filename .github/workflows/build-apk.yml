name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create twa-manifest.json
        run: |
          mkdir twa-build
          cat > twa-build/twa-manifest.json << 'TWAMAN'
{
  "packageId": "com.incomesplitter.app",
  "host": "incomesplitter.github.io",
  "name": "Income Splitter",
  "launcherName": "Splitter",
  "display": "standalone",
  "themeColor": "#0f1117",
  "navigationColor": "#0f1117",
  "navigationColorDark": "#0f1117",
  "navigationDividerColor": "#0f1117",
  "navigationDividerColorDark": "#0f1117",
  "backgroundColor": "#0f1117",
  "enableNotifications": false,
  "startUrl": "/income-splitter2/",
  "iconUrl": "https://incomesplitter.github.io/income-splitter2/icon-512.png",
  "maskableIconUrl": "https://incomesplitter.github.io/income-splitter2/icon-512.png",
  "monochromeIconUrl": "https://incomesplitter.github.io/income-splitter2/icon-512.png",
  "splashScreenFadeOutDuration": 300,
  "signingKey": {
    "path": "./android.keystore",
    "alias": "incomesplitter"
  },
  "appVersionCode": 1,
  "appVersionName": "1.0.0",
  "shortcuts": [],
  "generatorApp": "bubblewrap-cli",
  "webManifestUrl": "https://incomesplitter.github.io/income-splitter2/manifest.json",
  "fallbackType": "customtabs",
  "features": {},
  "alphaDependencies": {
    "enabled": false
  },
  "enableSiteSettingsShortcut": true,
  "isChromeOSOnly": false,
  "isMetaQuest": false,
  "fullScopeUrl": "https://incomesplitter.github.io/income-splitter2/",
  "minSdkVersion": 19,
  "orientation": "portrait",
  "fingerprints": [
    {
      "name": "debug",
      "value": "CE:16:3A:54:8D:8F:2F:15:A9:F5:CA:BB:30:76:6F:46:50:67:A2:91:48:DE:B5:CC:40:07:ED:BF:CB:05:19:CC"
    }
  ]
}
TWAMAN

      - name: Setup Bubblewrap JDK config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BWCONFIG'
{
  "jdkPath": "$JAVA_HOME",
  "androidSdkPath": "$ANDROID_SDK_ROOT"
}
BWCONFIG

      - name: Generate TWA project
        working-directory: twa-build
        run: bubblewrap generate --manifest=./twa-manifest.json

      - name: Build APK
        working-directory: twa-build
        run: bubblewrap build --skipPwaValidation

      - name: List output files
        working-directory: twa-build
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: income-splitter-apk
          path: |
            twa-build/*.apk
            twa-build/app-release-unsigned.apk
            twa-build/app-release-signed.apk
            twa-build/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
