name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Create project files
        run: python3 create_project.py

      - name: Make gradlew executable
        run: chmod +x twa/gradlew

      - name: Build Release APK
        run: cd twa && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Find APK
        run: find twa -name "*.apk" || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: income-splitter-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
