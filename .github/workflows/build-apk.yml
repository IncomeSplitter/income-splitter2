name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create TWA Android project structure
        run: |
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/app/src/main/java/com/incomesplitter/app

          # settings.gradle
          cat > twa-app/settings.gradle << 'SETTINGSEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "IncomeSplitter"
          include ':app'
          SETTINGSEOF

          # Root build.gradle
          cat > twa-app/build.gradle << 'BUILDEOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          BUILDEOF

          # App build.gradle
          cat > twa-app/app/build.gradle << 'APPEOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.incomesplitter.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.incomesplitter.app'
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          APPEOF

          # AndroidManifest.xml
          cat > twa-app/app/src/main/AndroidManifest.xml << 'MANEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="https" />
                  </intent>
              </queries>
              <application
                  android:label="Income Splitter"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.LauncherActivity"
                  tools:replace="android:theme">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:theme="@style/Theme.LauncherActivity">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://incomesplitter.github.io/income-splitter2/" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:value="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.FALLBACK_STRATEGY"
                          android:value="customtabs" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                                android:host="incomesplitter.github.io"
                                android:pathPrefix="/income-splitter2" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:exported="true"
                      android:enabled="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          MANEOF

          # Colors
          cat > twa-app/app/src/main/res/values/colors.xml << 'COLOREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0f1117</color>
              <color name="colorPrimaryDark">#0f1117</color>
          </resources>
          COLOREOF

          # Styles
          cat > twa-app/app/src/main/res/values/styles.xml << 'STYLEEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          STYLEEOF

          # Download app icon
          curl -L "https://incomesplitter.github.io/income-splitter2/icon-512.png" \
            -o twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || \
            cp twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png \
            twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true

          # gradle.properties
          cat > twa-app/gradle.properties << 'PROPEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROPEOF

          # gradlew script
          cat > twa-app/gradlew << 'GRADLEWEOF'
          #!/bin/sh
          exec gradle "$@"
          GRADLEWEOF
          chmod +x twa-app/gradlew

          # gradle wrapper properties
          mkdir -p twa-app/gradle/wrapper
          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'WRAPEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPEOF

      - name: Build debug APK
        working-directory: twa-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: income-splitter-apk
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
