name: Build TWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Setup Bubblewrap JDK config
        run: |
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/opt/hostedtoolcache/Java_Temurin-Distributions_jdk/17.0.14-7/x64","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json

      - name: Create keystore
        run: |
          keytool -genkeypair \
            -dname "CN=Income Splitter, OU=App, O=IncomeSplitter, L=Auckland, S=Auckland, C=NZ" \
            -alias incomesplitter \
            -keypass android \
            -keystore twa-keystore.jks \
            -storepass android \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Init Bubblewrap project
        working-directory: /tmp
        run: |
          mkdir twa-build && cd twa-build
          expect -c '
            log_user 1
            set timeout 120
            spawn bubblewrap init --manifest=https://incomesplitter.github.io/income-splitter2/manifest.json --skipPwaValidation
            expect {
              "install the JDK" { send "n\r"; exp_continue }
              "Domain:" { send "\r"; exp_continue }
              "URL path:" { send "\r"; exp_continue }
              "Application name:" { send "\r"; exp_continue }
              "short name:" { send "\r"; exp_continue }
              "version name" { send "\r"; exp_continue }
              "version code" { send "\r"; exp_continue }
              "Display mode" { send "\r"; exp_continue }
              "Orientation" { send "\r"; exp_continue }
              "status bar" { send "\r"; exp_continue }
              "navigation bar" { send "\r"; exp_continue }
              "splash screen" { send "\r"; exp_continue }
              "icon" { send "\r"; exp_continue }
              "maskable" { send "\r"; exp_continue }
              "monochrome" { send "\r"; exp_continue }
              "shortcuts" { send "\r"; exp_continue }
              "signing key" { send "\r"; exp_continue }
              "Key Store" { send "android\r"; exp_continue }
              "Key password" { send "android\r"; exp_continue }
              "alias" { send "\r"; exp_continue }
              eof
            }
          '
          echo "=== Files after init ==="
          ls -la /tmp/twa-build/

      - name: Copy keystore and build directly with Gradle
        run: |
          cp twa-keystore.jks /tmp/twa-build/android.keystore
          cd /tmp/twa-build
          echo "=== All files ==="
          ls -la
          echo "=== Running Gradle build ==="
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=incomesplitter \
              -Pandroid.injected.signing.key.password=android \
              --no-daemon
          else
            echo "No gradlew found - init did not complete"
            find /tmp/twa-build -type f
          fi

      - name: Find APK
        run: find /tmp/twa-build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: income-splitter-apk
          path: /tmp/twa-build/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
