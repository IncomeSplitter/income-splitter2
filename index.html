<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="themeColor" content="#000000">
<title>Income Splitter</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  [data-theme="dark"] {
    --bg:#0f1117; --surface:#181c27; --surface2:#1f2535; --surface3:#252b3b;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#f0f2f8; --muted:#6b7394; --accent:#c8f55a;
    --warn:#ff8c69; --glow1:rgba(200,245,90,0.06); --glow2:rgba(105,196,255,0.04);
  }
  [data-theme="light"] {
    --bg:#f4f5f7; --surface:#ffffff; --surface2:#eef0f4; --surface3:#e4e7ed;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --text:#1a1d26; --muted:#8b90a8; --accent:#5a9e00;
    --warn:#d44800; --glow1:rgba(90,158,0,0.05); --glow2:rgba(0,120,200,0.04);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overscroll-behavior:none}

  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100dvh;
    padding:calc(20px + env(safe-area-inset-top,0px)) 16px calc(20px + env(safe-area-inset-bottom,0px));
    background-image:
      radial-gradient(ellipse at 20% 0%,var(--glow1) 0%,transparent 55%),
      radial-gradient(ellipse at 80% 100%,var(--glow2) 0%,transparent 55%);
    transition:background .3s,color .3s;
  }

  .app{width:100%;max-width:420px;margin:0 auto}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;animation:fadeUp .4s ease both}
  .header-center{text-align:center;flex:1}
  .header-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .header h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;line-height:1.1}
  .header h1 em{font-style:italic;color:var(--accent)}
  .header-spacer{width:36px;flex-shrink:0}

  .theme-toggle{background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .theme-toggle:active{transform:scale(.9)}

  /* Tabs */
  .tabs{display:flex;gap:5px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;animation:fadeUp .4s ease both;animation-delay:.04s;transition:background .3s,border-color .3s}
  .tab{flex:1;background:none;border:none;border-radius:10px;padding:9px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .tab.active{background:var(--surface3);color:var(--text)}

  .view{display:none}
  .view.active{display:block}

  /* Input card */
  .input-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden;animation:fadeUp .4s ease both;animation-delay:.08s;transition:background .3s,border-color .3s}
  .input-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,245,90,.4),transparent)}
  [data-theme="light"] .input-card::before{background:linear-gradient(90deg,transparent,rgba(90,158,0,.3),transparent)}

  .input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
  .amount-row{display:flex;align-items:center;gap:4px}
  .currency-symbol{font-family:'DM Serif Display',serif;font-size:30px;color:var(--muted);line-height:1;padding-top:3px;min-width:24px;text-align:center}
  .amount-input{background:none;border:none;outline:none;font-family:'DM Serif Display',serif;font-size:46px;color:var(--text);width:100%;caret-color:var(--accent);-moz-appearance:textfield}
  .amount-input::placeholder{color:var(--surface3)}
  .amount-input::-webkit-outer-spin-button,.amount-input::-webkit-inner-spin-button{-webkit-appearance:none}

  .divider{height:1px;background:var(--border);margin:14px 0}

  /* Summary row inside input card */
  .summary-rows{display:flex;flex-direction:column;gap:5px}
  .summary-row{display:flex;justify-content:space-between;align-items:center}
  .summary-row span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
  .summary-row .summary-val{color:var(--accent);opacity:0;transition:opacity .3s}
  .summary-row .summary-val.visible{opacity:1}
  .summary-row .summary-val.warn{color:var(--warn) !important}

  /* Warning banner */
  .warning-banner{background:rgba(255,140,105,0.1);border:1px solid rgba(255,140,105,0.3);border-radius:12px;padding:10px 14px;margin-bottom:10px;display:none;animation:fadeUp .3s ease both}
  .warning-banner.show{display:block}
  .warning-banner p{font-family:'DM Mono',monospace;font-size:10px;color:var(--warn);letter-spacing:.06em;line-height:1.6}

  /* Bucket sections in calc view */
  .bucket-section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:12px 0 6px 4px}

  /* Buckets */
  .buckets{display:flex;flex-direction:column;gap:8px;animation:fadeUp .4s ease both;animation-delay:.12s}
  .bucket{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;transition:transform .15s,background .3s,border-color .3s;-webkit-tap-highlight-color:transparent}
  .bucket:active{transform:scale(.97)}
  .bucket::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:.8}
  .bucket-left{display:flex;flex-direction:column;gap:3px}
  .bucket-name{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .bucket-sub{font-size:11px;color:var(--muted);font-weight:300}
  .bucket-amount{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);transition:all .4s cubic-bezier(.34,1.56,.64,1);min-width:80px;text-align:right}
  .bucket-amount.zero{color:var(--surface3)}
  .bucket-amount.pop{transform:scale(1.08)}
  .bucket.type-fixed{opacity:1}
  .bucket.type-fixed .bucket-sub{color:var(--muted)}

  /* Bar */
  .bar-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-top:8px;animation:fadeUp .4s ease both;animation-delay:.16s;transition:background .3s,border-color .3s}
  .bar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
  .bar-track{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;display:flex;gap:2px}
  .bar-seg{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.34,1.2,.64,1),opacity .3s;width:0%;opacity:.25}

  .clear-btn{display:block;width:100%;margin-top:10px;background:none;border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;animation:fadeUp .4s ease both;animation-delay:.2s}
  .clear-btn:active{transform:scale(.97);color:var(--text)}

  /* Settings */
  .settings-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;transition:background .3s,border-color .3s}
  .section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .settings-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .total-warning{font-family:'DM Mono',monospace;font-size:10px;transition:color .3s}
  .total-warning.ok{color:var(--accent)}
  .total-warning.over{color:var(--warn)}
  .total-warning.under{color:#69c4ff}

  .bucket-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}

  .bucket-row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;position:relative;overflow:hidden;animation:fadeUp .3s ease both;transition:background .3s}
  .bucket-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:.8}

  /* Top row of bucket-row: dot + name + delete */
  .bucket-row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}

  .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .2s;border:2px solid transparent}
  .color-dot:active{transform:scale(1.35)}

  .bucket-name-input{background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text);flex:1;min-width:0}
  .bucket-name-input::placeholder{color:var(--muted)}

  .delete-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:color .15s}
  .delete-btn:active{color:var(--warn)}

  /* Type toggle + value input row */
  .bucket-row-bottom{display:flex;align-items:center;gap:6px}

  .type-toggle{display:flex;background:var(--surface3);border-radius:8px;padding:3px;gap:3px;flex-shrink:0}
  .type-btn{background:none;border:none;border-radius:6px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .type-btn.active{background:var(--surface);color:var(--text)}

  .value-input-wrap{display:flex;align-items:center;gap:3px;background:var(--surface3);border-radius:8px;padding:5px 9px;flex:1}
  .value-sym{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0}
  .value-input{background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);width:100%;text-align:right;-moz-appearance:textfield}
  .value-input::-webkit-outer-spin-button,.value-input::-webkit-inner-spin-button{-webkit-appearance:none}

  .add-bucket-btn{width:100%;background:none;border:1px dashed var(--border2);border-radius:12px;padding:12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;margin-bottom:10px}
  .add-bucket-btn:active{border-color:var(--accent);color:var(--accent)}

  .save-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:15px;color:#000000;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .save-btn:active{transform:scale(.97);opacity:.88}

  /* Prefs */
  .theme-row{display:flex;gap:8px}
  .theme-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 8px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .theme-btn .icon{font-size:16px}
  .theme-btn:active{transform:scale(.96)}
  .theme-btn.selected{border-color:var(--accent);background:var(--surface3);color:var(--text)}

  .currency-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
  .currency-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .currency-btn:active{transform:scale(.94)}
  .currency-btn.selected{border-color:var(--accent);background:var(--surface3)}
  .currency-btn .sym{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1}
  .currency-btn.selected .sym{color:var(--accent)}

  /* Color picker */
  .color-picker-popup{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;width:180px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.35);animation:popIn .15s ease}
  .color-picker-popup.hidden{display:none}
  .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
  .color-swatch:active{transform:scale(1.2)}
  .color-swatch.selected{border-color:var(--text)}

  .overlay{position:fixed;inset:0;z-index:99;display:none}
  .overlay.active{display:block}

  .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border2);border-radius:99px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.1em;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:200;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}

  @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse-glow{0%{box-shadow:0 0 0 0 rgba(200,245,90,.25)}100%{box-shadow:0 0 0 10px rgba(200,245,90,0)}}
  .bucket.updated{animation:pulse-glow .5s ease-out}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-spacer"></div>
    <div class="header-center">
      <p class="header-label">Invoice received</p>
      <h1>Income <em>Splitter</em></h1>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="calc">Calculate</button>
    <button class="tab" data-tab="settings">Buckets</button>
    <button class="tab" data-tab="prefs">Preferences</button>
  </div>

  <!-- ── CALCULATE ── -->
  <div class="view active" id="view-calc">

    <div class="input-card">
      <label class="input-label" for="amountInput">Amount received</label>
      <div class="amount-row">
        <span class="currency-symbol" id="currencyDisplay">$</span>
        <input class="amount-input" id="amountInput" type="number" inputmode="decimal" placeholder="0" min="0" step="0.01" autofocus/>
      </div>
      <div class="divider"></div>
      <div class="summary-rows">
        <div class="summary-row">
          <span>Fixed deductions</span>
          <span class="summary-val" id="sumFixed"></span>
        </div>
        <div class="summary-row">
          <span>Remaining to split</span>
          <span class="summary-val" id="sumRemaining"></span>
        </div>
        <div class="summary-row">
          <span>Total allocated</span>
          <span class="summary-val" id="sumTotal"></span>
        </div>
      </div>
    </div>

    <!-- Overdraft warning -->
    <div class="warning-banner" id="warningBanner">
      <p id="warningText"></p>
    </div>

    <div class="buckets" id="bucketsDisplay"></div>

    <div class="bar-card">
      <p class="bar-label">Split breakdown</p>
      <div class="bar-track" id="barTrack"></div>
    </div>

    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>

  <!-- ── BUCKETS SETTINGS ── -->
  <div class="view" id="view-settings">
    <div class="settings-section">
      <div class="settings-header-row">
        <p class="section-label" style="margin-bottom:0">Buckets</p>
        <span class="total-warning ok" id="totalWarning">100% ✓</span>
      </div>
      <p style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em;margin-bottom:12px;line-height:1.6">
        Fixed $ buckets are deducted first. Percent buckets split what remains. Percent buckets must total 100%.
      </p>
      <div class="bucket-rows" id="bucketRows"></div>
      <button class="add-bucket-btn" id="addBucketBtn">+ Add bucket</button>
      <button class="save-btn" id="saveBtn">Save & apply</button>
    </div>
  </div>

  <!-- ── PREFERENCES ── -->
  <div class="view" id="view-prefs">
    <div class="settings-section">
      <p class="section-label">Theme</p>
      <div class="theme-row">
        <button class="theme-btn selected" id="themeDark" data-theme="dark"><span class="icon">🌙</span>Dark</button>
        <button class="theme-btn" id="themeLight" data-theme="light"><span class="icon">☀️</span>Light</button>
      </div>
    </div>
    <div class="settings-section">
      <p class="section-label">Currency symbol</p>
      <div class="currency-grid" id="currencyGrid"></div>
    </div>
  </div>

</div>

<div class="color-picker-popup hidden" id="colorPicker"></div>
<div class="overlay" id="overlay"></div>
<div class="toast" id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────
const PALETTE = [
  '#ff8c69','#ffb347','#ffd166','#c8f55a',
  '#69c4ff','#a78bfa','#f472b6','#34d399',
  '#fb923c','#e879f9','#22d3ee','#f87171'
];

const CURRENCIES = ['$','£','€','¥'];

const DEFAULT_BUCKETS = [
  { name:'Tax',     type:'pct', value:40, color:'#ff8c69' },
  { name:'Savings', type:'pct', value:10, color:'#69c4ff' },
  { name:'Draw',    type:'pct', value:50, color:'#c8f55a' },
];

// ── State ─────────────────────────────────────────────────────────
let buckets  = JSON.parse(localStorage.getItem('buckets_v2') || 'null') || DEFAULT_BUCKETS;
let currency = localStorage.getItem('currency') || '$';
let theme    = localStorage.getItem('theme')    || 'dark';

// ── Init ──────────────────────────────────────────────────────────
applyTheme(theme, false);
applyCurrency(currency, false);
buildCurrencyGrid();
renderCalc();

// ── Helpers ───────────────────────────────────────────────────────
function fmt(n) {
  if (n === 0) return currency + '0';
  return currency + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function persist() {
  localStorage.setItem('buckets_v2', JSON.stringify(buckets));
  localStorage.setItem('currency', currency);
  localStorage.setItem('theme', theme);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Calculation logic ─────────────────────────────────────────────
function calcSplit(amount) {
  const fixedBuckets = buckets.filter(b => b.type === 'fixed');
  const pctBuckets   = buckets.filter(b => b.type === 'pct');

  const totalFixed = fixedBuckets.reduce((s, b) => s + (parseFloat(b.value) || 0), 0);
  const remainder  = amount - totalFixed;
  const isOverdraft = totalFixed > amount && amount > 0;

  // Each bucket gets its calculated amount
  const results = buckets.map(b => {
    if (b.type === 'fixed') {
      return parseFloat(b.value) || 0;
    } else {
      // % of remainder (could be negative if overdraft)
      return remainder * ((parseFloat(b.value) || 0) / 100);
    }
  });

  return { results, totalFixed, remainder, isOverdraft };
}

// ── Theme ─────────────────────────────────────────────────────────
function applyTheme(t, doSave = true) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
  document.getElementById('themeColor').content = t === 'dark' ? '#000000' : '#f4f5f7';
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('selected', b.dataset.theme === t));
  if (doSave) persist();
}

document.getElementById('themeToggle').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
document.querySelectorAll('.theme-btn').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));

// ── Currency ──────────────────────────────────────────────────────
function applyCurrency(sym, doSave = true) {
  currency = sym;
  document.getElementById('currencyDisplay').textContent = sym;
  document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('selected', b.dataset.sym === sym));
  updateCalc();
  if (doSave) persist();
}

function buildCurrencyGrid() {
  const grid = document.getElementById('currencyGrid');
  grid.innerHTML = '';
  CURRENCIES.forEach(sym => {
    const btn = document.createElement('button');
    btn.className = 'currency-btn' + (sym === currency ? ' selected' : '');
    btn.dataset.sym = sym;
    btn.innerHTML = `<span class="sym">${sym}</span>`;
    btn.addEventListener('click', () => applyCurrency(sym));
    grid.appendChild(btn);
  });
}

// ── Tabs ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'settings') renderSettings();
    if (tab.dataset.tab === 'calc')     renderCalc();
    if (tab.dataset.tab === 'prefs')    buildCurrencyGrid();
  });
});

// ── CALCULATE VIEW ────────────────────────────────────────────────
function renderCalc() {
  const display  = document.getElementById('bucketsDisplay');
  const barTrack = document.getElementById('barTrack');
  document.querySelectorAll('style.dyn').forEach(s => s.remove());
  display.innerHTML = '';
  barTrack.innerHTML = '';

  const amount = parseFloat(document.getElementById('amountInput').value) || 0;
  const { results, totalFixed, remainder, isOverdraft } = calcSplit(amount);

  // Section labels
  const hasFixed = buckets.some(b => b.type === 'fixed');
  const hasPct   = buckets.some(b => b.type === 'pct');

  buckets.forEach((b, i) => {
    // Optional section divider label
    if (hasFixed && hasPct) {
      if (i === 0 && b.type === 'fixed') {
        const lbl = document.createElement('p');
        lbl.className = 'bucket-section-label';
        lbl.textContent = 'Fixed amounts';
        display.appendChild(lbl);
      }
      if (b.type === 'pct' && (i === 0 || buckets[i-1].type === 'fixed')) {
        const lbl = document.createElement('p');
        lbl.className = 'bucket-section-label';
        lbl.textContent = 'Percent of remainder';
        display.appendChild(lbl);
      }
    }

    const val = results[i];
    const el  = document.createElement('div');
    el.className = 'bucket' + (b.type === 'fixed' ? ' type-fixed' : '');
    el.id = 'bucket-' + i;

    const subLabel = b.type === 'fixed'
      ? `fixed ${fmt(parseFloat(b.value)||0)}`
      : `${b.value}% of remainder`;

    el.innerHTML = `
      <div class="bucket-left">
        <span class="bucket-name" style="color:${b.color}">${b.name}</span>
        <span class="bucket-sub">${subLabel}</span>
      </div>
      <span class="bucket-amount ${amount === 0 ? 'zero' : ''}" id="amt-${i}">${fmt(val)}</span>
    `;

    const s = document.createElement('style');
    s.className = 'dyn';
    s.textContent = `#bucket-${i}::after { background: ${b.color}; }`;
    document.head.appendChild(s);
    display.appendChild(el);

    // Bar segments — width based on % of total invoice
    const seg = document.createElement('div');
    seg.className = 'bar-seg';
    seg.id = 'bar-' + i;
    seg.style.background = b.color;
    const barPct = amount > 0 ? Math.max(0, (val / amount) * 100) : (b.type === 'pct' ? b.value : 0);
    seg.style.width   = barPct + '%';
    seg.style.opacity = amount > 0 ? '1' : '0.25';
    barTrack.appendChild(seg);
  });

  updateSummary(amount, totalFixed, remainder, isOverdraft, results);
}

function updateCalc() {
  const amount = parseFloat(document.getElementById('amountInput').value) || 0;
  const { results, totalFixed, remainder, isOverdraft } = calcSplit(amount);

  buckets.forEach((b, i) => {
    const val   = results[i];
    const amtEl = document.getElementById('amt-' + i);
    const barEl = document.getElementById('bar-' + i);
    if (!amtEl) return;

    amtEl.textContent = fmt(val);
    amtEl.classList.toggle('zero', amount === 0);

    if (amount > 0) {
      amtEl.classList.remove('pop'); void amtEl.offsetWidth; amtEl.classList.add('pop');
      setTimeout(() => amtEl.classList.remove('pop'), 400);
      const bEl = document.getElementById('bucket-' + i);
      if (bEl) { bEl.classList.remove('updated'); void bEl.offsetWidth; bEl.classList.add('updated'); setTimeout(() => bEl.classList.remove('updated'), 500); }
    }

    if (barEl) {
      const barPct = amount > 0 ? Math.max(0, (val / amount) * 100) : (b.type === 'pct' ? b.value : 0);
      barEl.style.width   = barPct + '%';
      barEl.style.opacity = amount > 0 ? '1' : '0.25';
    }
  });

  updateSummary(amount, totalFixed, remainder, isOverdraft, results);
}

function updateSummary(amount, totalFixed, remainder, isOverdraft, results) {
  const hasFixed   = buckets.some(b => b.type === 'fixed');
  const totalAlloc = results.reduce((s, v) => s + v, 0);

  const sfEl = document.getElementById('sumFixed');
  const srEl = document.getElementById('sumRemaining');
  const stEl = document.getElementById('sumTotal');
  const wb   = document.getElementById('warningBanner');
  const wt   = document.getElementById('warningText');

  if (amount > 0) {
    if (hasFixed) {
      sfEl.textContent = fmt(totalFixed);
      sfEl.classList.add('visible');
      sfEl.classList.toggle('warn', isOverdraft);

      srEl.textContent = isOverdraft ? '-' + fmt(Math.abs(remainder)) : fmt(Math.max(0, remainder));
      srEl.classList.add('visible');
      srEl.classList.toggle('warn', isOverdraft);
    } else {
      sfEl.classList.remove('visible');
      srEl.classList.remove('visible');
    }

    stEl.textContent = fmt(totalAlloc) + ' ✓';
    stEl.classList.add('visible');
    stEl.classList.remove('warn');

    // Warning banner
    if (isOverdraft) {
      wb.classList.add('show');
      wt.textContent = `⚠ Fixed deductions (${fmt(totalFixed)}) exceed this invoice by ${fmt(Math.abs(remainder))}. Percent buckets will show a shortfall.`;
    } else {
      wb.classList.remove('show');
    }
  } else {
    [sfEl, srEl, stEl].forEach(el => el.classList.remove('visible'));
    wb.classList.remove('show');
  }
}

document.getElementById('amountInput').addEventListener('input', updateCalc);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('amountInput').value = '';
  updateCalc();
  document.getElementById('amountInput').focus();
});

// ── SETTINGS VIEW ─────────────────────────────────────────────────
function renderSettings() {
  const rows = document.getElementById('bucketRows');
  rows.innerHTML = '';
  document.querySelectorAll('style.dyn-row').forEach(s => s.remove());

  buckets.forEach((b, i) => {
    const row = document.createElement('div');
    row.className = 'bucket-row';
    row.id = 'row-' + i;
    row.style.animationDelay = (i * 0.04) + 's';

    const s = document.createElement('style');
    s.className = 'dyn-row';
    s.textContent = `#row-${i}::before { background: ${b.color}; }`;
    document.head.appendChild(s);

    const isPct = b.type === 'pct';

    row.innerHTML = `
      <div class="bucket-row-top">
        <div class="color-dot" id="dot-${i}" style="background:${b.color}"></div>
        <input class="bucket-name-input" id="name-${i}" value="${b.name}" placeholder="Name" maxlength="14"/>
        <button class="delete-btn" data-index="${i}">×</button>
      </div>
      <div class="bucket-row-bottom">
        <div class="type-toggle">
          <button class="type-btn ${isPct ? 'active' : ''}" data-type="pct" data-index="${i}">%</button>
          <button class="type-btn ${!isPct ? 'active' : ''}" data-type="fixed" data-index="${i}">${currency}</button>
        </div>
        <div class="value-input-wrap">
          <span class="value-sym">${isPct ? '%' : currency}</span>
          <input class="value-input" id="val-${i}" type="number" min="0" value="${b.value}" inputmode="decimal"/>
        </div>
      </div>
    `;

    rows.appendChild(row);

    // Name
    row.querySelector('.bucket-name-input').addEventListener('input', e => { buckets[i].name = e.target.value; });

    // Value
    row.querySelector('.value-input').addEventListener('input', e => {
      buckets[i].value = parseFloat(e.target.value) || 0;
      updateTotalWarning();
    });

    // Type toggle
    row.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        buckets[i].type  = btn.dataset.type;
        buckets[i].value = 0;
        renderSettings();
        updateTotalWarning();
      });
    });

    // Delete
    row.querySelector('.delete-btn').addEventListener('click', () => {
      if (buckets.length <= 1) { showToast('Need at least one bucket'); return; }
      buckets.splice(i, 1);
      renderSettings();
    });

    // Color dot
    row.querySelector('.color-dot').addEventListener('click', e => {
      e.stopPropagation();
      openColorPicker(i, row.querySelector('.color-dot'));
    });
  });

  updateTotalWarning();
}

function updateTotalWarning() {
  const pctBuckets = buckets.filter(b => b.type === 'pct');
  const total = pctBuckets.reduce((s, b) => s + (parseFloat(b.value) || 0), 0);
  const el = document.getElementById('totalWarning');

  if (pctBuckets.length === 0) {
    el.textContent = 'No % buckets';
    el.className = 'total-warning ok';
  } else if (Math.abs(total - 100) < 0.01) {
    el.textContent = '% = 100 ✓';
    el.className = 'total-warning ok';
  } else if (total > 100) {
    el.textContent = `% = ${total.toFixed(1)} — over`;
    el.className = 'total-warning over';
  } else {
    el.textContent = `% = ${total.toFixed(1)} — ${(100-total).toFixed(1)} left`;
    el.className = 'total-warning under';
  }
}

document.getElementById('addBucketBtn').addEventListener('click', () => {
  const used = buckets.map(b => b.color);
  const col  = PALETTE.find(c => !used.includes(c)) || PALETTE[buckets.length % PALETTE.length];
  buckets.push({ name:'Bucket', type:'pct', value:0, color:col });
  renderSettings();
  setTimeout(() => {
    const lastVal = document.getElementById('val-' + (buckets.length - 1));
    if (lastVal) { lastVal.focus(); lastVal.select(); }
  }, 80);
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const pctBuckets = buckets.filter(b => b.type === 'pct');
  if (pctBuckets.length > 0) {
    const total = pctBuckets.reduce((s, b) => s + (parseFloat(b.value) || 0), 0);
    if (Math.abs(total - 100) > 0.5) {
      showToast(`% buckets must total 100 (now ${total.toFixed(1)})`);
      return;
    }
  }
  buckets = buckets.map(b => ({ ...b, value: parseFloat(b.value) || 0 }));
  persist();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector('[data-tab="calc"]').classList.add('active');
  document.getElementById('view-calc').classList.add('active');
  renderCalc();
  updateCalc();
  showToast('Saved ✓');
});

// ── Color Picker ──────────────────────────────────────────────────
function openColorPicker(index, dotEl) {
  const picker  = document.getElementById('colorPicker');
  const overlay = document.getElementById('overlay');
  picker.innerHTML = '';
  PALETTE.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (buckets[index].color === color ? ' selected' : '');
    sw.style.background = color;
    sw.addEventListener('click', () => { buckets[index].color = color; renderSettings(); closeColorPicker(); });
    picker.appendChild(sw);
  });
  const rect = dotEl.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 8) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 196) + 'px';
  picker.classList.remove('hidden');
  overlay.classList.add('active');
}

function closeColorPicker() {
  document.getElementById('colorPicker').classList.add('hidden');
  document.getElementById('overlay').classList.remove('active');
}

document.getElementById('overlay').addEventListener('click', closeColorPicker);

// ── Service Worker ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/income-splitter2/sw.js')
    .catch(err => console.log('SW registration failed:', err));
}
</script>
